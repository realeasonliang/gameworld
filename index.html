<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的游戏世界 · Game World</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg:#05060a; --panel1:#13203a; --panel2:#0c1526;
    --blue:#4aa3ff; --blue2:#5b8dff; --teal:#7fffd4;
    --text:#e8eefc; --muted:#8fb6ff; --muted2:#9fb4dd; --faint:#5f7299;
    --line:rgba(91,141,255,.28);
  }
  body { min-height:100vh;
    background:
      radial-gradient(1100px 560px at 50% -8%, #1b2f57 0%, transparent 60%),
      radial-gradient(900px 520px at 50% 116%, #0c1a3a 0%, transparent 60%),
      var(--bg);
    font-family:'Microsoft YaHei','PingFang SC',sans-serif; color:var(--text);
    display:flex; flex-direction:column; align-items:center; padding:52px 16px 40px; position:relative; }
  .lang-switch { position:absolute; top:18px; right:18px; cursor:pointer;
    background:rgba(20,40,40,.5); color:var(--teal); border:1px solid #2c4a4a;
    padding:7px 14px; border-radius:20px; font-size:13px; user-select:none; transition:.15s; backdrop-filter:blur(4px); }
  .lang-switch:hover { border-color:var(--teal); transform:translateY(-1px); }
  h1 { font-size:42px; letter-spacing:4px; margin-bottom:8px;
    background:linear-gradient(180deg,#ffffff 0%, #bcd4ff 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 0 22px rgba(74,163,255,.55)); }
  .sub { color:var(--muted); margin-bottom:14px; letter-spacing:1px; font-size:14px; }
  .accent-line { width:72px; height:3px; margin:0 auto 22px; border-radius:3px;
    background:linear-gradient(90deg,var(--blue),var(--teal)); box-shadow:0 0 14px var(--blue); }
  .tabs { display:flex; gap:12px; justify-content:center; margin-bottom:26px; }
  .tab { cursor:pointer; padding:9px 22px; border-radius:24px; border:1px solid var(--line);
    background:rgba(20,40,40,.35); color:var(--muted); font-size:14px; user-select:none; transition:.18s; }
  .tab:hover { border-color:var(--blue2); color:#cfe0ff; }
  .tab.active { background:linear-gradient(180deg,#1d3a6b,#16294d); color:#fff; border-color:var(--blue2);
    box-shadow:0 0 16px rgba(91,141,255,.5); }
  .site-header { width:100%; max-width:960px; display:flex; flex-wrap:wrap; justify-content:space-between; align-items:flex-start; gap:20px; margin:0 auto 26px; }
  .site-brand { flex:1 1 320px; text-align:center; }
  .grid { display:flex; gap:22px; flex-wrap:wrap; justify-content:center; max-width:900px; }
  .card { position:relative; overflow:hidden; width:248px; background:linear-gradient(160deg,var(--panel1),var(--panel2));
    border:1px solid #25365c; border-radius:16px; padding:24px 22px; text-decoration:none;
    color:var(--text); transition:transform .14s ease, border-color .14s ease, box-shadow .14s ease; }
  .card::before { content:''; position:absolute; left:0; right:0; top:0; height:96px;
    background:radial-gradient(140px 70px at 50% -16px, rgba(91,141,255,.22), transparent 70%); pointer-events:none; }
  .card:hover { transform:translateY(-6px); border-color:var(--blue2); box-shadow:0 12px 30px rgba(0,0,0,.35), 0 0 22px rgba(91,141,255,.25); }
  .card .ico { position:relative; display:inline-flex; align-items:center; justify-content:center;
    width:58px; height:58px; font-size:32px; margin-bottom:12px; border-radius:14px;
    background:rgba(74,163,255,.12); border:1px solid rgba(91,141,255,.3); }
  .card h2 { position:relative; font-size:20px; margin-bottom:8px; }
  .card p { position:relative; font-size:13px; color:var(--muted2); line-height:1.65; }
  .tag { position:relative; display:inline-block; margin-top:12px; font-size:11px; color:var(--teal);
    background:rgba(20,40,40,.5); padding:3px 9px; border-radius:20px; }
  .qr-box { position:relative; margin-top:0; display:inline-flex; align-items:center; justify-content:center;
    background:linear-gradient(160deg,var(--panel1),var(--panel2)); border:1px solid var(--line);
    border-radius:16px; padding:10px; box-shadow:0 0 22px rgba(74,163,255,.18); width:fit-content; }
  .qr-code { background:#fff; padding:8px; border-radius:10px; line-height:0; flex:0 0 auto; border:1px solid #e6ecf7; }
  .qr-code svg { display:block; width:92px; height:92px; }
  .qr-tooltip { position:absolute; top:calc(100% + 8px); left:50%; transform:translateX(-50%) translateY(4px);
    background:rgba(10,18,36,.96); color:var(--teal); font-size:12px; letter-spacing:.5px; font-weight:600;
    padding:6px 12px; border-radius:8px; border:1px solid var(--line); white-space:nowrap;
    opacity:0; pointer-events:none; transition:opacity .18s ease, transform .18s ease; z-index:5;
    box-shadow:0 6px 18px rgba(0,0,0,.35); }
  .qr-tooltip::before { content:''; position:absolute; bottom:100%; left:50%; transform:translateX(-50%);
    border:5px solid transparent; border-bottom-color:rgba(10,18,36,.96); }
  .qr-box:hover .qr-tooltip { opacity:1; transform:translateX(-50%) translateY(0); }
  .comments { margin-top:30px; width:100%; max-width:760px; background:linear-gradient(160deg,var(--panel1),var(--panel2));
    border:1px solid #25365c; border-radius:16px; padding:22px 24px; box-shadow:0 0 22px rgba(74,163,255,.12); }
  .comments-title { font-size:22px; margin-bottom:14px; color:var(--text); text-align:center; letter-spacing:2px; }
  footer { margin-top:38px; font-size:12px; color:var(--faint); text-align:center; }
  @media (min-width:768px) {
    .qr-box { padding:12px 16px; gap:12px; }
  }
  @media (max-width:640px) {
    .site-header { justify-content:center; }
    .qr-box { justify-content:center; width:fit-content; margin:0 auto; max-width:560px; }
    h1 { font-size:34px; }
  }
  </style>
  <script src="assets/qrcode.min.js"></script>
</head>
<body>
  <div class="lang-switch" id="langSwitch">🌐 EN</div>
  <header class="site-header">
    <div class="site-brand">
      <h1 id="siteTitle">我的游戏世界</h1>
      <div class="sub" id="siteSub">GAME WORLD · 三个纯前端 HTML5 小游戏</div>
      <div class="accent-line"></div>
      <div class="tabs">
        <div class="tab active" id="tabHome" data-tab="home">🎮 游戏</div>
        <div class="tab" id="tabComments" data-tab="comments">💬 留言板</div>
      </div>
    </div>
    <div class="qr-box">
      <div class="qr-code" id="qrCode"></div>
      <div class="qr-tooltip" id="qrTip">扫码访问我的网站</div>
    </div>
  </header>
  <div id="panelHome">
    <div class="grid" id="grid"></div>
  </div>
  <section class="comments" id="panelComments" style="display:none">
    <h2 class="comments-title" id="commentsTitle">留言板</h2>
    <script src="https://giscus.app/client.js"
      data-repo="realeasonliang/gameworld"
      data-repo-id="R_kgDOTXN0QQ"
      data-category="General"
      data-category-id="DIC_kwDOTXN0Qc4DBfmP"
      data-mapping="pathname"
      data-strict="0"
      data-reactions-enabled="1"
      data-emit-metadata="0"
      data-input-position="bottom"
      data-theme="transparent_dark"
      data-lang="zh-CN"
      crossorigin="anonymous"
      async>
    </script>
  </section>
  <footer id="siteFooter">Made by Eason Liang · 上海市 · 即将小学五年级</footer>

<script>
  // ===== 站点文案（中/英） =====
  const I18N = {
    zh: {
      title: '我的游戏世界',
      sub: 'GAME WORLD · 三个纯前端 HTML5 小游戏',
      footer: 'Made by Eason Liang · 上海市 · 即将小学五年级',
      switchTo: 'EN',
      qrTip: '扫码访问我的网站',
      commentsTitle: '留言板',
      tabHome: '🎮 游戏',
      tabComments: '💬 留言板'
    },
    en: {
      title: 'My Game World',
      sub: 'GAME WORLD · Three pure-frontend HTML5 games',
      footer: 'Made by Eason Liang · Shanghai · Rising 5th grader',
      switchTo: '中文',
      qrTip: 'Scan to visit my site',
      commentsTitle: 'Comments',
      tabHome: '🎮 Games',
      tabComments: '💬 Comments'
    }
  };

  // ===== 站点地址（二维码扫码后打开的网址，改这里即可） =====
  const SITE_URL = 'https://gameworld-pages.pages.dev/';

  // ===== 生成二维码（纯本地生成，无需联网） =====
  (function renderQR() {
    try {
      const qr = qrcode(0, 'M');
      qr.addData(SITE_URL);
      qr.make();
      document.getElementById('qrCode').innerHTML = qr.createSvgTag(4, 8);
    } catch (e) {
      document.getElementById('qrCode').textContent = 'QR 生成失败';
    }
  })();

  // ===== 游戏列表（加新游戏只需在此加一条） =====
  const GAMES = [
    {
      folder: 'sfs', file: 'sfs.html', icon: '🚀',
      title: { zh: '航天模拟器', en: 'Space Flight Sim' },
      desc: {
        zh: '建造火箭、发射、入轨、登陆星球、对接空间站、驾驶漫游车。多体太阳系 + 真实引力。',
        en: 'Build rockets, launch, reach orbit, land on planets, dock with stations, drive rovers. Multi-body solar system + real gravity.'
      },
      tag: { zh: 'Space Flight Sim', en: 'Space Flight Sim' }
    },
    {
      folder: 'minecraft', file: 'minecraft.html', icon: '⛏️',
      title: { zh: '方块世界', en: 'Block World' },
      desc: {
        zh: '第一人称 3D 沙盒，无限程序化地形、挖掘建造、牛羊漫游。',
        en: 'First-person 3D sandbox with infinite procedural terrain, dig & build, wandering animals.'
      },
      tag: { zh: 'Sandbox', en: 'Sandbox' }
    },
    {
      folder: 'pvz', file: 'pvz.html', icon: '🌻',
      title: { zh: '植物大战僵尸', en: 'Plants vs Zombies' },
      desc: {
        zh: '经典塔防，阳光经济、多种植物与僵尸，还带数学 / 英语答题挑战。',
        en: 'Classic tower defense with sun economy, many plants & zombies, plus math / English quiz challenges.'
      },
      tag: { zh: 'Tower Defense', en: 'Tower Defense' }
    }
  ];

  // ===== 语言检测 + 切换 =====
  function detectLang() {
    const saved = localStorage.getItem('gw-lang');
    if (saved === 'zh' || saved === 'en') return saved;
    const nav = (navigator.language || 'zh').toLowerCase();
    return nav.startsWith('zh') ? 'zh' : 'en';
  }
  let lang = detectLang();

  function render() {
    const t = I18N[lang];
    document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
    document.getElementById('siteTitle').textContent = t.title;
    document.getElementById('siteSub').textContent = t.sub;
    document.getElementById('siteFooter').textContent = t.footer;
    document.getElementById('langSwitch').textContent = '🌐 ' + t.switchTo;
    document.getElementById('qrTip').textContent = t.qrTip;
    document.getElementById('commentsTitle').textContent = t.commentsTitle;
    document.getElementById('tabHome').textContent = t.tabHome;
    document.getElementById('tabComments').textContent = t.tabComments;

    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    GAMES.forEach(g => {
      const a = document.createElement('a');
      a.className = 'card';
      a.href = 'games/' + g.folder + '/' + g.file;
      a.innerHTML =
        '<div class="ico">' + g.icon + '</div>' +
        '<h2>' + g.title[lang] + '</h2>' +
        '<p>' + g.desc[lang] + '</p>' +
        '<span class="tag">' + g.tag[lang] + '</span>';
      grid.appendChild(a);
    });
  }

  function syncGiscus() {
    const f = document.querySelector('iframe.giscus-frame');
    if (f && f.contentWindow) {
      f.contentWindow.postMessage(
        { giscus: { setConfig: { theme: 'transparent_dark', lang: (lang === 'zh' ? 'zh-CN' : 'en') } } },
        'https://giscus.app'
      );
    }
  }
  document.getElementById('langSwitch').addEventListener('click', () => {
    lang = (lang === 'zh') ? 'en' : 'zh';
    localStorage.setItem('gw-lang', lang);
    render();
    setTimeout(syncGiscus, 300);
  });
  window.addEventListener('load', () => setTimeout(syncGiscus, 1500));

  // ===== 顶部页签切换（游戏 / 留言板） =====
  function showTab(tab) {
    const isHome = (tab === 'home');
    document.getElementById('panelHome').style.display = isHome ? '' : 'none';
    document.getElementById('panelComments').style.display = isHome ? 'none' : '';
    document.getElementById('tabHome').classList.toggle('active', isHome);
    document.getElementById('tabComments').classList.toggle('active', !isHome);
    if (!isHome) setTimeout(syncGiscus, 300);
  }
  document.getElementById('tabHome').addEventListener('click', () => showTab('home'));
  document.getElementById('tabComments').addEventListener('click', () => showTab('comments'));

  render();
</script>
</body>
</html>
